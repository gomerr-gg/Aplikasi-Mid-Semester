<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Background: Gradasi Hijau Muda yang Santai -->
<body class="bg-gradient-to-br from-green-100 via-emerald-50 to-teal-100 min-h-screen flex items-center justify-center font-sans p-4">

<!-- Kartu Utama -->
<div class="bg-white/90 backdrop-blur rounded-3xl shadow-xl max-w-md w-full text-center overflow-hidden">

    <!-- Strip Atas: Gradasi Hijau -->
    <div class="h-2 bg-gradient-to-r from-emerald-400 to-teal-400"></div>

    <div class="p-10">
        <!-- Ikon -->
        <div class="mb-6 text-6xl">👋</div>

        <!-- Judul -->
        <h1 class="text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600" th:text="${greeting}">
            Greeting
        </h1>

        <!-- Deskripsi -->
        <p class="text-gray-500 mb-8 text-lg">
            Selamat datang di aplikasi kami!
        </p>

        <!-- Grup Tombol (Vertikal) -->
        <div class="flex flex-col gap-4">

            <!-- Tombol Utama: Kembali ke Home -->
            <a th:href="@{/}"
               class="inline-flex items-center justify-center px-8 py-3 text-base font-bold text-white bg-emerald-500 rounded-full hover:bg-emerald-600 shadow-md hover:shadow-lg hover:-translate-y-1 transition duration-300 ease-in-out">
                Kembali ke Home
            </a>

            <!-- Tombol Customer Service: Ajukan Pengaduan via WhatsApp -->
            <!-- Menggunakan target="_blank" agar terbuka di tab baru atau aplikasi -->
            <a href="https://wa.me/6281264210348?text=Halo,%20saya%20ingin%20mengadukan%20layanan." target="_blank"
               class="inline-flex items-center justify-center px-8 py-3 text-base font-bold text-emerald-600 bg-white border-2 border-emerald-100 rounded-full hover:bg-emerald-50 hover:border-emerald-200 shadow-sm hover:shadow-md transition duration-300 ease-in-out">
                <span class="mr-2">💬</span> Ajukan Pengaduan
            </a>

        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Background: Gradasi Hijau Muda -->
<body class="bg-gradient-to-br from-green-100 via-emerald-50 to-teal-100 min-h-screen flex items-center justify-center font-sans p-6">

<!-- Kartu Sederhana -->
<div class="bg-white/90 backdrop-blur rounded-3xl shadow-xl max-w-lg w-full p-10 text-center overflow-hidden">

    <!-- Strip Atas -->
    <div class="h-2 bg-gradient-to-r from-emerald-400 to-teal-400 mb-6"></div>

    <!-- Judul Pesan -->
    <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600" th:text="${message}">
        Ini Adalah Bagian Pesan
    </h1>

</div>

</body>
</html>

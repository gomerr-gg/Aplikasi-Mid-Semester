<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- Background: Gradasi Hijau Muda yang Santai -->
<body class="bg-gradient-to-br from-green-100 via-emerald-50 to-teal-100 min-h-screen flex flex-col font-sans text-gray-700">

<!-- ========================================== -->
<!-- NAVBAR: Simple & Fresh -->
<!-- ========================================== -->
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur shadow-sm border-b border-emerald-100">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a th:href="@{/}" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500 flex items-center gap-2">
            <span>🌿</span> MyApp
        </a>
        <!-- Menu -->
        <div class="space-x-6 font-medium text-gray-600">
            <a th:href="@{/}" class="hover:text-emerald-600 transition">Home</a>
            <a th:href="@{/products}" class="hover:text-emerald-600 transition">Products</a>
            <a th:href="@{/about}" class="hover:text-emerald-600 transition">About</a>
            <a th:href="@{/greet}" class="hover:text-emerald-600 transition">Greet</a>
            <a th:href="@{/test}" class="hover:text-emerald-600 transition">Test</a>
        </div>
    </div>
</nav>

<!-- ========================================== -->
<!-- MAIN CONTENT: Card Center -->
<!-- ========================================== -->
<main class="flex-grow container mx-auto px-4 py-12">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Strip Atas: Gradasi Hijau -->
        <div class="h-2 bg-gradient-to-r from-emerald-400 to-teal-400"></div>

        <div class="p-8 md:p-12 space-y-8">
            <!-- Bagian Teks -->
            <div>
                <h1 class="text-4xl font-extrabold text-gray-800 mb-4" th:text="${title}">Title</h1>
                <p class="text-lg text-gray-600 leading-relaxed" th:text="${description}">Aplikasi Tugas Mid Semester</p>
            </div>

            <hr class="border-emerald-50">

            <!-- Bagian Tombol (Kotak Hijau Muda) -->
            <div class="bg-emerald-50 rounded-xl p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h3 class="font-bold text-gray-800 text-lg">Jelajahi Produk</h3>
                    <p class="text-sm text-emerald-600">Temukan kebutuhan Anda</p>
                </div>
                <div class="flex gap-3">
                    <!-- Tombol Utama -->
                    <a th:href="@{/products}" class="px-6 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-lg shadow-md transition transform hover:-translate-y-0.5">
                        Semua Produk
                    </a>
                    <!-- Tombol Kategori -->
                    <a th:href="@{/products/category/Elektronik}" class="px-4 py-2.5 bg-white text-emerald-600 border border-emerald-200 rounded-lg font-medium hover:bg-emerald-50 transition">Elektronik</a>
                    <a th:href="@{/products/category/Buku}" class="px-4 py-2.5 bg-white text-emerald-600 border border-emerald-200 rounded-lg font-medium hover:bg-emerald-50 transition">Buku</a>
                    <a th:href="@{/products/category/Makanan}" class="px-4 py-2.5 bg-white text-emerald-600 border border-emerald-200 rounded-lg font-medium hover:bg-emerald-50 transition">Makanan</a>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- ========================================== -->
<!-- FOOTER: Simple Text -->
<!-- ========================================== -->
<footer class="py-6 text-center text-emerald-700 text-sm font-medium">
    &copy; 2026 MyApp. Built with Spring Boot & Tailwind.
</footer>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 text-gray-800">

<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mx-auto px-6 py-6">

    <!-- Judul -->
    <h1 class="text-3xl font-bold text-green-700 mb-6" th:text="${title}">Judul</h1>

    <!-- Search Form -->
    <form th:action="@{/products/search}" method="get" class="mb-6 flex gap-2">
        <input type="text" name="keyword"
               class="flex-1 px-4 py-2 rounded-lg border border-green-300 focus:outline-none focus:ring-2 focus:ring-green-400"
               placeholder="Cari produk..." th:value="${keyword}">
        <button type="submit"
                class="px-4 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white font-semibold">
            Cari
        </button>
    </form>

    <!-- Category Filter -->
    <div class="mb-4 flex flex-wrap gap-2 items-center">
        <span class="font-medium text-gray-600">Filter:</span>
        <a th:href="@{/products}" class="px-3 py-1 rounded-full bg-green-500 text-white text-sm hover:bg-green-600">Semua</a>
        <a th:href="@{/products/category/Elektronik}" class="px-3 py-1 rounded-full bg-teal-500 text-white text-sm hover:bg-teal-600">Elektronik</a>
        <a th:href="@{/products/category/Buku}" class="px-3 py-1 rounded-full bg-emerald-500 text-white text-sm hover:bg-emerald-600">Buku</a>
        <a th:href="@{/products/category/Makanan}" class="px-3 py-1 rounded-full bg-lime-500 text-white text-sm hover:bg-lime-600">Makanan</a>
    </div>

    <p class="text-gray-500 mb-4">
        Menampilkan <strong th:text="${totalProducts}">0</strong> produk
    </p>

    <!-- Daftar Produk -->
    <div th:if="${!products.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div th:each="product : ${products}"
             class="bg-white rounded-xl shadow-md p-5 border border-green-100">

            <!-- Header Card dengan Icon -->
            <div class="flex justify-between items-start mb-3">
                <h2 class="text-xl font-semibold text-green-700" th:text="${product.name}">Nama Produk</h2>
                <span class="text-xs px-2 py-1 rounded-full"
                      th:classappend="${product.category == 'Elektronik' ? 'bg-teal-100 text-teal-700' :
                                       product.category == 'Buku' ? 'bg-emerald-100 text-emerald-700' :
                                       'bg-lime-100 text-lime-700'}"
                      th:text="${product.category}">Kategori</span>
            </div>

            <p class="mb-2 text-green-600 font-bold text-lg"
               th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                Rp 0
            </p>

            <p class="mb-4 text-gray-600">
                Stok:
                <span class="font-semibold"
                      th:classappend="${product.stock < 20 ? 'text-red-500' : 'text-green-600'}"
                      th:text="${product.stock}">0</span>
            </p>

            <a th:href="@{/products/{id}(id=${product.id})}"
               class="block w-full py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white text-center font-medium">
                Lihat Detail
            </a>
        </div>
    </div>

    <!-- Pesan kosong -->
    <div th:if="${products.isEmpty()}"
         class="bg-green-100 border border-green-400 text-green-700 px-4 py-4 rounded-lg shadow mt-6">
        Tidak ada produk yang ditemukan.
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
